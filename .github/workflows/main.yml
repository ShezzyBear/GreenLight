name: Tee Time Check

on:
  schedule:
    - cron: "0 13 * * *"  # Runs daily at 13:00 UTC (9:00 AM EST / 8:00 AM EDT)
  workflow_dispatch:       # Allow manual trigger with inputs

jobs:
  check-tee-times:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run tee time check
        run: python .tee-time-checker/tee_time_checker.py --date "${{ github.event.inputs.date || '' }}" --players "${{ github.event.inputs.players || '2' }}" --days "${{ github.event.inputs.days || '14' }}"
